name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install pytest pytest-cov ruff numpy
      - run: ruff check . --select E,F,I --ignore E501,E402,F401,F841,UP --exclude tests || true
      - run: pytest tests/ -v --cov=analyzer --cov-report=xml || true
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true
